<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Startup Explorer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #090a0f;
  --surface: #12141d;
  --surface-hover: #1a1d27;
  --primary: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-purple: #8b5cf6;
  --text: #ffffff;
  --text-muted: #94a3b8;
  --border: rgba(255, 255, 255, 0.08);
  --border-light: rgba(255, 255, 255, 0.15);
  --radius: 16px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: 'Inter', -apple-system, sans-serif; 
  font-size: 13px; 
  line-height: 1.5;
  background-image: radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.08), transparent 25%),
                    radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
  min-height: 100vh;
}
a { color: var(--text); text-decoration: none; }

/* Top Navigation */
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  background: rgba(18, 20, 29, 0.8);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-left { display: flex; align-items: center; gap: 40px; }
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
.logo-icon { 
  width: 32px; height: 32px; border-radius: 50%; 
  background: linear-gradient(135deg, var(--primary), var(--accent-purple));
  display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800;
}
.logo-text span { display: block; font-size: 11px; font-weight: 400; color: var(--text-muted); }

.nav-links { display: flex; gap: 24px; }
.nav-link { 
  color: var(--text-muted); font-weight: 500; font-size: 14px; 
  padding-bottom: 4px; position: relative; transition: color 0.2s;
}
.nav-link:hover { color: var(--text); }
.nav-link.active { color: var(--text); }
.nav-link.active::after {
  content: ''; position: absolute; bottom: -20px; left: 0; right: 0;
  height: 2px; background: var(--primary);
}

.nav-right { display: flex; align-items: center; gap: 20px; }
.search-bar {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 16px;
  display: flex; align-items: center; gap: 8px;
  width: 260px;
}
.search-bar input {
  background: transparent; border: none; color: var(--text); outline: none; width: 100%; font-size: 13px;
}
.search-bar input::placeholder { color: var(--text-muted); }
.user-profile { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: #475569; }
.user-name { font-weight: 500; font-size: 13px; }
.icon-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; }
.icon-btn:hover { color: var(--text); }

/* Main Layout */
.container { max-width: 1400px; margin: 0 auto; padding: 40px 32px; }

/* Page Header */
.page-header { margin-bottom: 32px; }
.page-header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; text-transform: uppercase; margin-bottom: 8px; }
.page-header p { color: var(--text-muted); font-size: 13px; }

/* Filters */
.filters-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; gap: 16px; flex-wrap: wrap; }
.filters-left { display: flex; gap: 16px; flex-wrap: wrap; }
.filter-group { display: flex; flex-direction: column; gap: 6px; }
.filter-group label { font-size: 11px; font-weight: 600; color: var(--text-muted); }
.select-box {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  outline: none;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 16px;
  padding-right: 40px;
  min-width: 160px;
}
.select-box:focus { border-color: var(--primary); }

.filters-right { display: flex; gap: 12px; align-items: flex-end; }
.view-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.view-btn { background: rgba(255,255,255,0.03); border: none; padding: 10px 12px; color: var(--text-muted); cursor: pointer; }
.view-btn.active { background: rgba(255,255,255,0.1); color: var(--text); }

/* Card Grid */
.opportunities-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.opp-card {
  background: linear-gradient(180deg, rgba(30,32,44,0.6) 0%, rgba(18,20,29,0.9) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
}
.opp-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
}
/* Subtle color glows based on category */
.opp-card.gov { box-shadow: inset 0 20px 40px -20px rgba(16, 185, 129, 0.1); }
.opp-card.vc { box-shadow: inset 0 20px 40px -20px rgba(139, 92, 246, 0.15); }
.opp-card.perk { box-shadow: inset 0 20px 40px -20px rgba(6, 182, 212, 0.15); }
.opp-card:hover { transform: translateY(-4px); border-color: var(--border-light); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.funding-source { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.funding-source strong { display: block; color: var(--accent-cyan); font-size: 12px; font-weight: 600; margin-top: 2px; }
.opp-card.vc .funding-source strong { color: var(--accent-purple); }
.opp-card.gov .funding-source strong { color: #10b981; }

.card-icon { 
  width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}

.provider { font-size: 18px; font-weight: 800; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; line-height: 1.4; color: var(--text); }

.funding-amount { margin-bottom: 16px; }
.funding-amount span { font-size: 11px; color: var(--text-muted); display: block; }
.funding-amount strong { font-size: 16px; font-weight: 700; }

.card-meta { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; flex-grow: 1; }
.meta-item { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--text-muted); }
.meta-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.7; margin-top: 2px; }

.card-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--border); }
.deadline { font-size: 11px; color: var(--text-muted); }
.deadline strong { display: block; color: var(--text); font-size: 12px; margin-top: 2px; }

.btn-apply {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
  text-decoration: none;
}
.btn-apply:hover { opacity: 0.9; }

/* Loading & Pagination */
.loading-indicator { text-align: center; padding: 40px; color: var(--text-muted); display: none; }
.pagination { display: flex; justify-content: center; gap: 8px; }
.page-btn { 
  background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); 
  padding: 8px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s;
}
.page-btn:hover { background: rgba(255,255,255,0.1); }
.page-btn.active { background: var(--primary); border-color: var(--primary); }
</style>
</head>
<body>

<!-- Top Navigation -->
<nav class="navbar">
  <div class="nav-left">
    <a href="/" class="logo">
      <div class="logo-icon">GSE</div>
      <div class="logo-text">
        Startup Explorer
        <span>Global Ecosystem Explorer</span>
      </div>
    </a>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link active">Explore</a>
      <a href="/" class="nav-link">Database</a>
      <a href="#" class="nav-link">Analytics</a>
      <a href="#" class="nav-link">Network</a>
    </div>
  </div>
  <div class="nav-right">
    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInp" placeholder="Search Startups, Regions, Funding...">
    </div>
    <div class="user-profile">
      <div class="user-avatar"></div>
      <span class="user-name">Sarah Jenkins</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Startup Funding Opportunities</h1>
    <p>Discover 32,500+ global grants, accelerators, and VC funds.</p>
  </div>

  <!-- Filters -->
  <div class="filters-row">
    <div class="filters-left">
      <div class="filter-group">
        <label>Category</label>
        <select class="select-box" id="catSel">
          <option value="All">All Opportunities</option>
          <option value="Gov Grants">Government Grants</option>
          <option value="VCs & Accelerators">VCs & Accelerators</option>
          <option value="Corporate">Corporate OI</option>
          <option value="Cloud & Perks">Cloud & Perks</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Industry</label>
        <select class="select-box" id="indSel">
          <option value="All">All Industries</option>
          <option value="FinTech">FinTech</option>
          <option value="SaaS">SaaS</option>
          <option value="AI">AI/ML</option>
          <option value="HealthTech">HealthTech</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Deadline</label>
        <select class="select-box" id="deadlineSel">
          <option value="All">Any Time</option>
          <option value="rolling">Next 30 Days / Rolling</option>
          <option value="fixed">Fixed Deadlines</option>
        </select>
      </div>
    </div>
    <div class="filters-right">
      <div class="filter-group">
        <label>Sort By</label>
        <select class="select-box" id="sortSel">
          <option value="fit_score">Relevance</option>
          <option value="funding_amount">Funding Amount</option>
          <option value="title">Title (A-Z)</option>
        </select>
      </div>
      <div class="view-toggle">
        <button class="view-btn active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></button>
        <button class="view-btn" onclick="window.location.href='/'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
      </div>
    </div>
  </div>

  <div class="opportunities-grid" id="mainGrid">
    <!-- Cards will be rendered here via JS -->
  </div>

  <div class="loading-indicator" id="loadingIndicator">
    Loading opportunities...
  </div>
  
  <div class="pagination" id="pagination"></div>
</div>

<script>
let currentPage = 1;
const perPage = 20;

function getCardClass(category) {
    if(category.includes('Gov')) return 'gov';
    if(category.includes('VC') || category.includes('Accel')) return 'vc';
    if(category.includes('Cloud') || category.includes('Perk')) return 'perk';
    return '';
}

function getIcon(category) {
    if(category.includes('Gov')) return '🏛';
    if(category.includes('VC')) return '🚀';
    if(category.includes('Corporate')) return '🏢';
    if(category.includes('Cloud')) return '☁️';
    return '💡';
}

async function fetchData() {
    document.getElementById('loadingIndicator').style.display = 'block';
    document.getElementById('mainGrid').innerHTML = '';
    
    const params = new URLSearchParams({
        country: 'Global',
        category: document.getElementById('catSel').value,
        industry: document.getElementById('indSel').value,
        deadline: document.getElementById('deadlineSel').value,
        search: document.getElementById('searchInp').value,
        sort_by: document.getElementById('sortSel').value,
        sort_dir: 'desc',
        page: currentPage,
        per_page: perPage
    });

    try {
        const res = await fetch(`/api/data?${params.toString()}`);
        const data = await res.json();
        renderGrid(data.records);
        renderPagination(data.total_pages);
    } catch (e) {
        console.error(e);
        document.getElementById('mainGrid').innerHTML = '<div style="grid-column: 1/-1; text-align: center;">Error loading data.</div>';
    } finally {
        document.getElementById('loadingIndicator').style.display = 'none';
    }
}

function renderGrid(records) {
    const grid = document.getElementById('mainGrid');
    if (!records.length) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">No opportunities found matching your criteria.</div>';
        return;
    }
    
    grid.innerHTML = records.map(r => `
        <div class="opp-card ${getCardClass(r.category)}">
            <div class="card-top">
                <div class="funding-source">
                    Funding Source
                    <strong>${r.category.toUpperCase()}</strong>
                </div>
                <div class="card-icon">${getIcon(r.category)}</div>
            </div>
            
            <div class="provider">
                ${r.provider || 'Ecosystem Partner'}
            </div>
            
            <div class="card-title">
                ${r.title}
            </div>
            
            <div class="funding-amount">
                <span>Funding Amount</span>
                <strong>${r.funding || 'Undisclosed'}</strong>
            </div>
            
            <div class="card-meta">
                <div class="meta-item">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    Focus: ${r.industries ? r.industries.split(',')[0] : 'General'}
                </div>
                <div class="meta-item">
                    <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    Location: ${r.country}
                </div>
            </div>
            
            <div class="card-bottom">
                <div class="deadline">
                    Deadline
                    <strong>${r.deadline || 'Rolling'}</strong>
                </div>
                <a href="${r.link}" target="_blank" class="btn-apply">Apply Now</a>
            </div>
        </div>
    `).join('');
}

function renderPagination(totalPages) {
    const pContainer = document.getElementById('pagination');
    pContainer.innerHTML = '';
    if (totalPages <= 1) return;
    
    let html = '';
    const maxVisible = 5;
    let start = Math.max(1, currentPage - 2);
    let end = Math.min(totalPages, start + maxVisible - 1);
    
    if (end - start < maxVisible - 1) {
        start = Math.max(1, end - maxVisible + 1);
    }
    
    if (currentPage > 1) {
        html += `<button class="page-btn" onclick="changePage(${currentPage - 1})">Prev</button>`;
    }
    
    for (let i = start; i <= end; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
    }
    
    if (currentPage < totalPages) {
        html += `<button class="page-btn" onclick="changePage(${currentPage + 1})">Next</button>`;
    }
    
    pContainer.innerHTML = html;
}

function changePage(p) {
    currentPage = p;
    fetchData();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Event Listeners
['catSel', 'indSel', 'deadlineSel', 'sortSel'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => { currentPage = 1; fetchData(); });
});

let debounceTimer;
document.getElementById('searchInp').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { currentPage = 1; fetchData(); }, 400);
});

// Initial load
fetchData();
</script>
</body>
</html>
