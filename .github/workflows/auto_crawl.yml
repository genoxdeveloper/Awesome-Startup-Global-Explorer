name: Auto Crawl & Update

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Global Crawler
        run: python startup_crawler_global.py
        env:
          DATABASE_URL: sqlite:///instance/global_data.db # Ensure it goes to a commit-able path

      - name: Commit and Push changes
        run: |
          git config --global user.name "GenoxAI-Bot"
          git config --global user.email "developer@genox.one"
          git add instance/global_data.db
          git commit -m "chore: nightly global data sync [skip ci]" || echo "No changes to commit"
          git push
